<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

  <!-- background -->
  <rect width="256" height="256" rx="56" fill="#0f172a"></rect>

  <!-- top cloud -->
  <g fill="#60a5fa">
    <circle cx="110" cy="70" r="16"></circle>
    <circle cx="140" cy="70" r="18"></circle>
    <circle cx="160" cy="78" r="14"></circle>
    <rect x="96" y="70" width="80" height="22" rx="11"></rect>
  </g>

  <!-- central hub -->
  <circle cx="128" cy="128" r="28" fill="#14b8a6"></circle>
  <circle cx="128" cy="128" r="10" fill="#0f172a"></circle>

  <!-- spokes -->
  <g stroke="#14b8a6" stroke-width="8" stroke-linecap="round">
    <line x1="128" y1="100" x2="128" y2="92"></line>
    <line x1="100" y1="128" x2="86" y2="128"></line>
    <line x1="156" y1="128" x2="170" y2="128"></line>
    <line x1="128" y1="156" x2="128" y2="176"></line>
  </g>

  <!-- side nodes -->
  <circle cx="72" cy="128" r="10" fill="#14b8a6"></circle>
  <circle cx="184" cy="128" r="10" fill="#14b8a6"></circle>

  <!-- mqtt node -->
  <circle cx="128" cy="196" r="14" fill="#22c55e"></circle>

</svg>